<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black text-indigo-600 tracking-tighter cursor-pointer">Tech Store</h1>
            
            <div class="relative w-full md:w-96">
                <input type="text" id="product-search" oninput="filterProducts()" placeholder="O que você procura hoje?" 
                    class="w-full bg-gray-100 border-none rounded-full py-2 px-10 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>

            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-4 font-medium text-gray-600">
                    <a href="#" class="hover:text-indigo-600 transition">Início</a>
                </nav>
                <button onclick="toggleCart()" class="relative p-2 text-gray-600 hover:text-indigo-600">
                    <i class="fa-solid fa-cart-shopping text-2xl"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold shadow-sm">0</span>
                </button>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-gray-100 sticky top-[130px] md:top-[73px] z-30 overflow-x-auto no-scrollbar">
        <div class="container mx-auto px-4 py-3 flex gap-2 whitespace-nowrap justify-start md:justify-center">
            <button onclick="filterCategory('todos')" class="cat-btn active-cat" data-category="todos">Todos</button>
            <button onclick="filterCategory('promo')" class="cat-btn text-red-600 font-bold" data-category="promo"><i class="fa-solid fa-percent mr-1"></i>Promoções</button>
            <button onclick="filterCategory('mouse')" class="cat-btn" data-category="mouse">Mouses</button>
            <button onclick="filterCategory('teclado')" class="cat-btn" data-category="teclado">Teclados</button>
            <button onclick="filterCategory('hardware')" class="cat-btn" data-category="hardware">Hardware</button>
            <button onclick="filterCategory('variados')" class="cat-btn" data-category="variados">Diversos</button>
        </div>
    </div>

    <section class="relative bg-indigo-900 h-[250px] md:h-[350px] flex items-center overflow-hidden">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover">
        </div>
        <div class="container mx-auto px-4 relative z-10 text-white">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-2">TechStore.</h2>
            <p class="text-lg opacity-90 max-w-lg">Entrega expressa em Recife e Região Metropolitana.</p>
        </div>
    </section>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <h2 id="section-title" class="text-2xl font-bold text-gray-900">Todos os Produtos</h2>
            <div class="text-sm font-bold text-green-600 bg-green-50 px-5 py-2 rounded-full border border-green-100 flex items-center gap-2">
                <i class="fa-solid fa-truck-fast"></i> Recife: Frete Grátis acima de R$ 25!
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="product-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 hidden-modal transition-all">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto relative flex flex-col md:flex-row shadow-2xl">
            <button onclick="closeProductModal()" class="absolute top-4 right-4 z-10 bg-white/80 backdrop-blur shadow rounded-full p-2 hover:bg-red-500 hover:text-white transition-all">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div class="w-full md:w-1/2 p-6 bg-gray-50 flex flex-col justify-center border-b md:border-b-0 md:border-r border-gray-100">
                <img id="modal-main-img" src="" class="w-full h-80 object-contain rounded-lg mb-4">
                <div id="modal-thumbnails" class="flex gap-2 overflow-x-auto pb-2 justify-center"></div>
            </div>
            <div class="w-full md:w-1/2 p-8 flex flex-col">
                <h3 id="modal-title" class="text-2xl font-black mb-2 uppercase italic text-indigo-900"></h3>
                <p id="modal-price" class="text-3xl font-bold text-indigo-600 mb-6"></p>
                <div class="mb-6">
                    <h4 class="font-bold text-gray-400 uppercase text-[10px] tracking-widest mb-2">Descrição</h4>
                    <p id="modal-desc" class="text-gray-600 text-sm leading-relaxed"></p>
                </div>
                <div class="mt-auto pt-4">
                    <button id="add-to-cart-btn" class="w-full bg-indigo-600 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-95">
                        <i class="fa-solid fa-cart-plus"></i> Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl z-50 cart-modal hidden-panel p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-xl font-bold">Meu Carrinho</h2>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
        <div class="border-t pt-6 mt-4 space-y-3">
            <div class="flex gap-2 mb-4">
                <input type="text" id="coupon-code" placeholder="Cupom" class="flex-1 bg-gray-100 border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <button onclick="applyCoupon()" class="bg-gray-800 text-white px-4 rounded-lg font-bold text-sm hover:bg-black transition-colors">Aplicar</button>
            </div>
            <div class="flex justify-between text-gray-500 text-sm font-medium"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
            <div class="flex justify-between text-green-600 text-sm font-bold"><span>Desconto</span><span id="discount-val">- R$ 0,00</span></div>
            <div class="flex justify-between text-gray-500 text-sm font-medium"><span>Frete (Recife)</span><span id="shipping-cost">R$ 0,00</span></div>
            <div class="flex justify-between text-2xl font-black text-indigo-700 pt-2 border-t"><span>Total</span><span id="total-price">R$ 0,00</span></div>
            <button onclick="showCheckout()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl mt-4 flex items-center justify-center gap-3 shadow-lg transform active:scale-95 transition-all">
                <i class="fa-brands fa-whatsapp text-xl"></i> Finalizar no WhatsApp
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
